{% extends 'record/base.html' %}

{% block title %}学習記録の削除確認{% endblock %}

{% block content %}
<h2>以下の学習記録を削除しますか？</h2>


<div class="card">
  <p><strong>日付:</strong> {{ object.date }}</p>
  <p><strong>メモ:</strong> {{ object.memo }}</p>
  <p><strong>お気に入り:</strong> {% if object.favorite %}はい{% else %}いいえ{% endif %}</p>
</div>

<form method="post">
  {% csrf_token %}
  <button type="submit">削除する</button>
    <a href="{{ request.GET.next|default:request.META.HTTP_REFERER }}">戻る</a>
</form>
{% endblock %}
